<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Caffe - Shop Beans</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="shop-header">
        <h1>NOC SPECIALTY COFFEE BEANS</h1>
        <p>Choose your favorite premium roast</p>
    </header>

    <main class="products-grid">

        <div class="product-card">
            <div class="product-image">
                <img src="IMG_8047.jpeg" alt="Peru Coffee Bean">
            </div>
            <div class="product-info">
                <h3>PERU 250g</h3>
                <p class="brand">NOC Origin</p>
                <div class="product-meta">
                    <p><strong>Process:</strong> Washed & Sun-Dried</p>
                    <p><strong>Altitude:</strong> 1,700m</p>
                    <p><strong>Notes:</strong> Honey, Citrus, Chocolate</p>
                </div>
                <div class="product-price-row">
                    <span class="price">51 SR</span>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
