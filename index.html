<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Caffe</title>
    <style>
        /* إعدادات الألوان البنية والبيج الدافئ */
        :root {
            --bg-dark: #231710;       /* بني داكن جداً للهيدر */
            --bg-main: #ede6df;       /* خلفية بيج دافئة واضحة */
            --bg-card: #ffffff;       /* أبيض دافئ للبطاقات */
            --text-primary: #3d261a;   /* بني محروق للنصوص */
            --text-secondary: #7a6051; /* بني متوسط للتفاصيل */
            --accent: #b08b73;         /* لون كراميل للتأثيرات */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
        }

        /* شريط التنقل العلوي باللون البني الداكن */
        header {
            position: relative;
            background-color: var(--bg-dark);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .logo {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-menu a {
            color: #ede6df;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
        }

        .nav-menu a:hover {
            color: var(--accent);
        }

        .lang-switch {
            background: transparent;
            border: 1px solid var(--accent);
            color: #ffffff;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .lang-switch:hover {
            background-color: var(--accent);
        }

        /* الهيكل الأساسي لصفحة الفروع */
        .page-wrapper {
            display: flex;
            flex-wrap: wrap;
            min-height: 70vh;
        }

        /* جانب كروت الفروع والمحتوى */
        .locations-side {
            flex: 1;
            min-width: 320px;
            padding: 40px 5%;
        }

        .locations-side h1 {
            font-size: 32px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--text-primary);
            padding-bottom: 10px;
        }

        /* بطاقة الفرع البنية */
        .location-card {
            background-color: var(--bg-card);
            border: 2px solid var(--text-primary);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 5px 5px 0px var(--text-primary);
        }

        .location-card h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .location-card p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .directions-btn {
            display: inline-block;
            background-color: var(--text-primary);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .directions-btn:hover {
            background-color: var(--accent);
        }

        /* الجانب البصري - تم وضع لون بني دافئ احتياطي ومضمون في حال لم تظهر الصورة */
        .visual-side {
            flex: 1;
            min-width: 320px;
            background-color: #3d261a;
            background-image: url('https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=1000');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 400px;
        }

        /* قسم اتصل بنا في الأسفل بناءً على بيانات صورتك */
        .contact-section {
            background-color: var(--bg-dark);
            color: #ffffff;
            padding: 50px 5%;
        }

        .contact-box {
            max-width: 600px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 30px;
            border-radius: 8px;
        }

        .contact-box h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: var(--accent);
            text-align: center;
        }

        .info-item {
            margin-bottom: 20px;
            font-size: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .info-item span {
            color: var(--accent);
            font-weight: bold;
            display: inline-block;
            width: 120px;
        }

        .info-item a {
            color: #ffffff;
            text-decoration: none;
        }

        /* تعديل الاتجاهات للغة الإنجليزية */
        html[dir="ltr"] .location-card {
            box-shadow: -5px 5px 0px var(--text-primary);
        }

        @media (max-width: 768px) {
            .page-wrapper {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NOC Caffe</div>
        <div class="nav-container">
            <nav>
                <ul class="nav-menu">
                    <li><a href="#" class="lang-target" data-key="mHome">الرئيسية</a></li>
                    <li><a href="https://ugc.production.linktr.ee/06829bbd-33bf-48d4-8c2f-d211f4a2bc36_Coffee-Beans-Edition.pdf" target="_blank" class="lang-target" data-key="mCollection">حبوب القهوة</a></li>
                    <li><a href="#contact" class="lang-target" data-key="mContact">اتصل بنا</a></li>
                </ul>
            </nav>
            <button class="lang-switch" onclick="toggleLang()">EN</button>
        </div>
    </header>

    <div class="page-wrapper">
        
        <div class="locations-side">
            <h1 class="lang-target" data-key="pageTitle">فروعنا</h1>
            
            <div class="location-card">
                <h2 class="lang-target" data-key="branchName">فرع المملكة العربية السعودية</h2>
                <p class="lang-target" data-key="branchDesc">المكتب الرئيسي وصالة عرض حبوب القهوة المتميزة المخصصة.</p>
                <p class="lang-target" data-key="branchHours">ساعات العمل: خدمة مستمرة 24/7</p>
                <br>
                <a href="https://www.google.com/maps/place/NOC+Caffe+and+Roastry,+%D8%AD%D9%8A,+King+Khalid+Rd,+Hittin,+Riyadh+13518,+Saudi+Arabia%E2%80%AD/@24.7681651,46.5768056,16z/data=!4m6!3m5!1s0x3e2ee1f0d2c345e9:0x105cee1586581d98!8m2!3d24.7681651!4d46.5768056!16s%2Fg%2F11hz__8tj7?utm_campaign=ml-le-16204600&g_ep=Eg1tbF8yMDI2MDUyMF8wIOC7DCoASAJQAg%3D%3D" target="_blank" class="directions-btn lang-target" data-key="getDirections">الحصول على الاتجاهات ←</a>
            </div>
        </div>

        <div class="visual-side"></div>

    </div>

    <section class="contact-section" id="contact">
        <div class="contact-box">
            <h2 class="lang-target" data-key="cTitle">تواصل معنا</h2>
            
            <div class="info-item">
                <span class="lang-target" data-key="cEmail">الإيميل:</span>
                <a href="mailto:NOC@SVC-Arabia.com">NOC@SVC-Arabia.com</a>
            </div>

            <div class="info-item">
                <span class="lang-target" data-key="cPhone">الهاتف:</span>
                <a href="tel:+966558373332" dir="ltr">+966558373332</a>
            </div>

            <div class="info-item">
                <span class="lang-target" data-key="cHours">ساعات العمل:</span>
                <strong dir="ltr">24/7</strong>
            </div>
        </div>
    </section>

    <script>
        const dict = {
            ar: {
                dir: "rtl", langBtn: "EN",
                mHome: "الرئيسية", mCollection: "حبوب القهوة", mContact: "اتصل بنا",
                pageTitle: "فروعنا", branchName: "فرع المملكة العربية السعودية",
                branchDesc: "المكتب الرئيسي وصالة عرض حبوب القهوة المتميزة المخصصة.",
                branchHours: "ساعات العمل: خدمة مستمرة 24/7", getDirections: "الحصول على الاتجاهات ←",
                cTitle: "تواصل معنا", cEmail: "الإيميل:", cPhone: "الهاتف:", cHours: "ساعات العمل:"
            },
            en: {
                dir: "ltr", langBtn: "AR",
                mHome: "HOME", mCollection: "COFFEE BEANS", mContact: "CONTACT US",
                pageTitle: "Locations", branchName: "Saudi Arabia Branch",
                branchDesc: "Main office and premium specialty coffee beans showroom.",
                branchHours: "Opening Hours: 24/7 Continuous Service", getDirections: "Get Directions →",
                cTitle: "Contact Us", cEmail: "Email:", cPhone: "Phone:", cHours: "Hours:"
            }
        };

        let currentLang = 'ar';

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const data = dict[currentLang];
            
            const root = document.getElementById('html-root');
            root.setAttribute('dir', data.dir);
            root.setAttribute('lang', currentLang);

            document.querySelector('.lang-switch').innerText = data.langBtn;

            document.querySelectorAll('.lang-target').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key]) el.innerText = data[key];
            });
        }
    </script>
</body>
</html>
